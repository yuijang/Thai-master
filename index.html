<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Lotto - 한국 로또 추첨기</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --tile-yellow: #fbc400;
            --tile-blue: #69c8f2;
            --tile-red: #ff7272;
            --tile-gray: #aaaaaa;
            --tile-green: #b0d840;
            --accent-color: #0078d7; /* Windows blue */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: left;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .lotto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        @media (min-width: 600px) {
            .lotto-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .number-tile {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            background-color: #333;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.5s;
            opacity: 0;
            transform: scale(0.8);
        }

        .number-tile.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Lotto Colors */
        .color-1 { background-color: var(--tile-yellow); color: #000; }
        .color-2 { background-color: var(--tile-blue); color: #fff; }
        .color-3 { background-color: var(--tile-red); color: #fff; }
        .color-4 { background-color: var(--tile-gray); color: #fff; }
        .color-5 { background-color: var(--tile-green); color: #fff; }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 400;
        }

        .btn:hover {
            background-color: #005a9e;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lotto <span style="font-weight: 600;">6/45</span></h1>
        
        <div class="lotto-grid" id="lottoGrid">
            <div class="number-tile">?</div>
            <div class="number-tile">?</div>
            <div class="number-tile">?</div>
            <div class="number-tile">?</div>
            <div class="number-tile">?</div>
            <div class="number-tile">?</div>
        </div>

        <div class="controls">
            <button class="btn" onclick="generateLotto()">추첨하기</button>
        </div>

        <div class="footer">
            Metro UI Style Generator | Built for GitHub Pages
        </div>
    </div>

    <script>
        function getColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        function generateLotto() {
            const grid = document.getElementById('lottoGrid');
            const tiles = grid.querySelectorAll('.number-tile');
            
            // Reset tiles
            tiles.forEach(tile => {
                tile.classList.remove('active', 'color-1', 'color-2', 'color-3', 'color-4', 'color-5');
                tile.innerText = '?';
            });

            // Generate 6 unique numbers
            const numbers = [];
            while (numbers.length < 6) {
                const r = Math.floor(Math.random() * 45) + 1;
                if (numbers.indexOf(r) === -1) numbers.push(r);
            }

            // Sort ascending
            numbers.sort((a, b) => a - b);

            // Display with animation delay
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const tile = tiles[index];
                    tile.innerText = num;
                    tile.classList.add(getColorClass(num));
                    tile.classList.add('active');
                }, index * 150);
            });
        }

        // Initialize with animation
        window.onload = () => {
            const tiles = document.querySelectorAll('.number-tile');
            tiles.forEach((tile, index) => {
                setTimeout(() => {
                    tile.classList.add('active');
                }, index * 50);
            });
        };
    </script>
</body>
</html>
